<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <style>
            @keyframes anda{
                from {
                    transform: translateX(0);
                    background-color: yellow;
                }

                50% {
                    background-color: green;
                }

                to{
                    transform: translateX(300px);
                    background-color: blue;
                }
            }

            @keyframes altura{
                0% {
                    height: 80px;
                }

                100% {
                    height: 120px;
                }
            }

            #anima{
                outline: 3px solid red;
                width: 400px;
            }

            #anima div{
                width: 100px;
                height: 50px;
                background-color: #ccc;
                margin-bottom: 10px;
            }

            #anima div:nth-child(1){
                animation-name: anda;
                animation-duration: 2s;
                animation-iteration-count: infinite;
                animation-timing-function: ease-in-out;
                animation-direction: alternate;
            }

            #anima div:nth-child(2){
                animation: anda 2s ease-in-out 3s infinite alternate both running;
                /* animation-fill-mode: forwards;
                animation-play-state: running; */
            }
            
            #anima div:nth-child(2):hover{
                animation-play-state: paused;
            }

            #anima div:nth-child(3){
                animation: anda 2s ease-in-out 2ms infinite alternate,
                    altura 1s linear 3 normal forwards;
            }
        </style>
    </head>
    
    <body>
        <div id="anima">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>
    </body>
</html>
